<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio · Pablo Guerra Oliva</title>
  <style>
    :root {
      --bg: #f2f4f8;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --max-width: 980px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      width: min(100%, var(--max-width));
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      margin: 0 0 0.8rem;
    }

    p {
      margin: 0 auto 1.5rem;
      max-width: 60ch;
      color: var(--muted);
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      padding: 0.7rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      background: var(--accent-hover);
      transform: translateY(-1px);
      outline: none;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Bienvenido</h1>
    <p>Hola, soy Pablo Guerra. En este sitio puedes ver mi currículum con mi formación, experiencia y habilidades profesionales.</p>
    <a class="btn" href="cv.html">Ver CV</a>
  </main>
</body>
</html>
