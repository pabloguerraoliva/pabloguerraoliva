<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto · Pablo Guerra Oliva</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <nav>
      <div class="nav-links">
        <a class="nav-btn" href="index.html">Bienvenida</a>
        <a class="nav-btn" href="cv.html">CV</a>
        <a class="nav-btn active" href="contacto.html">Contacto</a>
      </div>
    </nav>

    <section class="contact-wrapper">
      <div>
        <h1 class="section-title">Contacto</h1>
        <hr class="section-divider" />
        <form class="contact-form" action="https://formspree.io/f/xnjwkrnw" method="POST">
          <input type="hidden" name="_next" value="https://pabloguerraoliva.github.io/index.html" />
          <input type="hidden" name="_captcha" value="false" />

          <label class="form-field" for="nombre">
            <span>Nombre</span>
            <input id="nombre" name="name" type="text" autocomplete="name" required />
          </label>

          <label class="form-field" for="email">
            <span>Email</span>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </label>

          <label class="form-field" for="mensaje">
            <span>Mensaje</span>
            <textarea id="mensaje" name="message" rows="6" required></textarea>
          </label>

          <button class="form-submit" type="submit">Enviar mensaje</button>
        </form>
      </div>
    </section>
  </div>
</body>
</html>
